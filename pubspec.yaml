name: pocket_meow
description: PocketMeow is a premium minimal expense tracker.
publish_to: "none"
version: 1.0.3+1000003

environment:
  sdk: ^3.5.0

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  package_info_plus: ^8.0.2
  path: ^1.9.1
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  sqflite_common_ffi_web: ^1.1.2
  url_launcher: ^6.3.1
  # sqlite3_flutter_libs: ^0.5.24
  fl_chart: ^0.69.2
  file_picker: ^11.0.2
  excel: ^4.0.6
  path_provider: ^2.1.6
  open_filex: ^4.7.0
  fast_gbk: ^1.0.0
  csv: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3


flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#162127"
  adaptive_icon_foreground: assets/branding/app_icon.png
  windows:
    generate: true
    image_path: assets/branding/app_icon.png
  web:
    generate: true
    image_path: assets/branding/app_icon.png
    background_color: "#F5F7F8"
    theme_color: "#162127"


